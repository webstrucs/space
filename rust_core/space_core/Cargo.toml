# space/rust_core/space_core/Cargo.toml

[package]
name = "space_core"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full", "rt-multi-thread", "signal"] }
tracing = "0.1"
tracing-subscriber = "0.3"
lazy_static = "1.4.0"
governor = { version = "0.10.0", features = ["std"] }
socket2 = { version = "0.5", features = ["all"] }
bytes = "1.0"
libc = "0.2"
pprof = { version = "0.13", features = ["flamegraph", "prost-codec"] }
metrics = "0.21"
metrics-exporter-prometheus = "0.12"

# Para TLS/SSL
tokio-rustls = "0.26"
rustls = { version = "0.22", features = ["ring"] }
webpki-roots = "0.26"
rustls-pemfile = "2.2"

# Para parsing básico de HTTP
httparse = "1.8"

[profile.release]
debug = true

[features]
default = []
pprof = []